<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholarship Management System</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 0px 8px gray;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:1px solid gray;
border-radius:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
margin:3px;
}

.add{
background:green;
color:white;
}

.approve{
background:#28a745;
color:white;
}

.reject{
background:#dc3545;
color:white;
}

.delete{
background:#000;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,table td{
border:1px solid gray;
padding:10px;
text-align:center;
}

th{
background:#34495e;
color:white;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
flex:1;
background:#3498db;
color:white;
padding:20px;
border-radius:8px;
text-align:center;
font-size:20px;
}

.search{
display:flex;
gap:10px;
}

.search input{
flex:2;
}

.search select{
flex:1;
}

</style>

</head>
<body>

<header>
<h1>Scholarship Management System</h1>
</header>

<div class="container">

<div class="stats">

<div class="box">
<h3 id="total">0</h3>
<p>Total</p>
</div>

<div class="box" style="background:green;">
<h3 id="approved">0</h3>
<p>Approved</p>
</div>

<div class="box" style="background:red;">
<h3 id="rejected">0</h3>
<p>Rejected</p>
</div>

<div class="box" style="background:orange;">
<h3 id="pending">0</h3>
<p>Pending</p>
</div>

</div>

<div class="card">

<h2>Scholarship Application</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="college" placeholder="College Name">

<input type="number" id="marks" placeholder="Percentage">

<select id="category">
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>EWS</option>
</select>

<input type="number" id="income" placeholder="Annual Family Income">

<button class="add" onclick="addStudent()">Submit Application</button>

</div>

<div class="card">

<div class="search">

<input type="text" id="search" placeholder="Search Student" onkeyup="displayData()">

<select id="filter" onchange="displayData()">

<option value="All">All Status</option>
<option value="Pending">Pending</option>
<option value="Approved">Approved</option>
<option value="Rejected">Rejected</option>

</select>

</div>

<table>

<thead>

<tr>
<th>Name</th>
<th>College</th>
<th>Marks</th>
<th>Category</th>
<th>Income</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
